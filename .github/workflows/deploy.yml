name: Deploy

on:
  # main の CI が green になったら本番デプロイする
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # シークレット未設定の間はエラーにせずスキップする（セットアップ手順は README 参照）
      - name: Check Cloudflare secrets
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID が未設定のためデプロイをスキップしました。README の「デプロイ」を参照してください。"
          fi

      - uses: actions/checkout@v4
        if: steps.cf.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.configured == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Build
        if: steps.cf.outputs.configured == 'true'
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web --project-name=break-duel
