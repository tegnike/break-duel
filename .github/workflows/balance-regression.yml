name: Balance Regression

on:
  schedule:
    # 毎週土曜 06:00 JST（金曜 21:00 UTC）。定期実行は軽め（200戦/順）で傾向監視する
    - cron: "0 21 * * 5"
  workflow_dispatch:
    inputs:
      games_per_order:
        description: "1候補・1対戦順あたりの試合数。正式レポートは1000以上"
        required: false
        default: "1000"
      seed:
        description: "シミュレーションのシード"
        required: false
        default: "3000000"
      rule_set:
        description: "ルールセット（通常は current）"
        type: choice
        options:
          - current
        required: false
        default: "current"

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run balance regression
        env:
          GAMES: ${{ github.event.inputs.games_per_order || '200' }}
          SEED: ${{ github.event.inputs.seed || '3000000' }}
          RULE_SET: ${{ github.event.inputs.rule_set || 'current' }}
        run: |
          mkdir -p tmp
          npm run balance:cost -- \
            --rule-set "$RULE_SET" \
            --games-per-order "$GAMES" \
            --seed "$SEED" \
            --out tmp/balance-regression.json | tee tmp/balance-regression.txt
          npm run sim -- league \
            --games-per-pair "$GAMES" \
            --seed "$SEED" \
            --decks break control fire water wind earth \
            --out tmp/balance-regression-league | tee -a tmp/balance-regression.txt

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## バランス回帰結果"
            echo ""
            echo '```'
            cat tmp/balance-regression.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: balance-regression-${{ github.run_number }}
          path: |
            tmp/balance-regression.json
            tmp/balance-regression.txt
            tmp/balance-regression-league
          retention-days: 90
